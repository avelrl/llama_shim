services:
  shim:
    build:
      context: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.data:/app/.data
    environment:
      LLAMA_BASE_URL: ${LLAMA_BASE_URL:-http://host.docker.internal:8081}
    extra_hosts:
      - "host.docker.internal:host-gateway"
