id: bugfix_mixed
title: Go bugfix with text before patch
category: regression
suites:
  - codex-real-upstream
timeout: 300s
attempts: 2
prompt: |
  This is a single-turn coding task. First include exactly MIXED_CAUSE_FOUND in a short sentence, but do not stop after that sentence.
  Continue in the same turn by using tools to inspect mathutil.go and mathutil_test.go, fix the bug, run tests, and finish with MIXED_BUGFIX_OK.
  The final answer must contain MIXED_BUGFIX_OK after the file has been changed and tests have passed.
expected:
  final_text_contains:
    - MIXED_BUGFIX_OK
  files:
    - path: mathutil.go
      contains: "return a + b"
  commands:
    - name: go test
      command: GOCACHE="$(pwd)/.gocache" go test ./...
      timeout: 60s
  codex_events:
    - item.completed:agent_message
    - item.started:file_change
    - turn.completed
  forbidden_output:
    - "<|tool_call"
    - "<|tool_calls_section"
