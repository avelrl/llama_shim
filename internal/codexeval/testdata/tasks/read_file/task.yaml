id: read_file
title: Read file through local command
category: read
suites:
  - codex-smoke
  - codex-core
  - codex-real-upstream
timeout: 120s
attempts: 2
prompt: |
  This is the Codex eval read file case. Use exec_command to read README.md and confirm it contains llama-shim-42. Then reply READ_OK.
expected:
  final_text_contains:
    - READ_OK
  files:
    - path: README.md
      contains: llama-shim-42
  codex_events:
    - item.started:command_execution
    - item.completed:agent_message
    - turn.completed
  forbidden_output:
    - "<|tool_call"
    - "<|tool_calls_section"
