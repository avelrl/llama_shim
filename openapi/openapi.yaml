openapi: 3.1.0
info:
  title: llama_shim API
  version: 0.1.0
  summary: Minimal OpenAI-compatible surface owned by llama_shim
  description: |
    Versioned API contract for the routes currently implemented or explicitly
    owned by `llama_shim`.

    The spec is intentionally narrow:
    - only routes that exist in the current server are documented
    - operation status is marked with `x-shim-status`
    - `implemented` means the shim owns the route contract
    - `partial` means the shim owns only part of the route behavior or request surface
    - `proxy` means the route is validated and then forwarded to the upstream backend

    Notes:
    - `/v1/responses` is local-first for the supported subset and may still proxy
      unsupported features upstream depending on `responses.mode`
    - item payloads are intentionally described as typed open objects because the
      shim preserves normalized raw item bodies across several Responses and
      Conversations flows
servers:
  - url: http://127.0.0.1:8080
tags:
  - name: health
  - name: responses
  - name: conversations
  - name: chat
  - name: retrieval
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      x-shim-status: implemented
      responses:
        "200":
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ok
        "405":
          $ref: "#/components/responses/ErrorResponse"
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      x-shim-status: implemented
      description: |
        Returns `200` only when both the SQLite store is reachable and the
        configured upstream llama-compatible backend responds successfully to
        `GET /v1/models` with a models-list payload.
      responses:
        "200":
          description: SQLite store and upstream backend are reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ready
        "503":
          description: SQLite store or upstream backend is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  message: llama backend is not ready
                  type: service_unavailable
                  param: null
                  code: null
        "405":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses:
    post:
      tags: [responses]
      summary: Create a response
      x-shim-status: partial
      description: |
        Creates a response using the shim-owned Responses surface.

        The request body is a partial OpenAI Responses-compatible object:
        - core fields such as `model`, `input`, `store`, `stream`,
          `previous_response_id`, `conversation`, and `instructions` are owned
          by the shim
        - `metadata` is validated and preserved on shim-local responses
        - shim-local structured outputs support `text.format.type=text`,
          `json_object`, and a documented `json_schema` subset
        - shim-local retrieval supports a pragmatic `file_search` subset over
          shim-owned local `vector_stores`
        - `background` is passed through to upstream `/v1/responses`; the shim
          does not execute background responses locally
        - a supported local subset is executed entirely inside the shim
        - unsupported fields may be proxied to upstream `/v1/responses` when
          `responses.mode` allows it

        Notes for the local structured-output subset:
        - `text.format.type=json_object` follows the OpenAI JSON mode guardrail
          and requires the string `JSON` to appear somewhere in the request
          context
        - `text.format.type=json_schema` supports a limited schema subset:
          `object|array|string|number|integer|boolean|null` plus
          `properties`, `required`, `additionalProperties`, `items`, and `enum`

        Notes for the local `file_search` subset:
        - the shim executes one `file_search` tool locally against shim-owned
          `vector_store_ids`
        - supported local knobs are `filters`, `max_num_results`,
          `ranking_options.score_threshold`, and
          `include=["file_search_call.results"]`
        - search is deterministic local lexical retrieval over normalized UTF-8
          text chunks, not hosted semantic-search parity
        - the shim returns `file_search_call` output items and stored/streaming
          replay, but does not currently synthesize hosted `file_citation`
          annotations in assistant messages

        Notes for the local `code_interpreter` subset:
        - the shim executes one `code_interpreter` tool locally only when
          `responses.code_interpreter.backend` is set to `docker` or
          `unsafe_host`
        - the supported local subset requires `container.type=auto`,
          optionally accepts shim-owned `container.file_ids`,
          accepts `tool_choice=auto|required`,
          accepts `include=["code_interpreter_call.outputs"]`,
          and returns stored/streaming `code_interpreter_call` items
        - `container.type=auto` reuses the last active shim-owned
          `code_interpreter_call.container_id` in stored lineage for the same
          backend, or creates a new `cntr_*` session if no active runtime is
          available
        - supported `container.file_ids` values are staged from local
          `/v1/files` into the current sandbox workspace under sanitized
          filenames before execution
        - `backend=docker` uses a hardened reusable session-container boundary;
          `backend=unsafe_host` remains a development fallback and legacy
          compatibility path
        - the local subset does not yet support automatic upload of
          `input_file` model content parts, generated file/image artifacts,
          `container_file_citation` annotations, or hosted sandbox/container
          lifecycle parity

        Retention semantics:
        - standalone responses follow the outward `store` contract returned on
          the response object
        - conversation-attached items follow the conversation lifecycle and are
          not subject to standalone response retention
        - the shim may persist hidden response rows needed for local
          `previous_response_id` replay even when the outward response reports
          `store=false`

        When `stream=true`, the response is emitted as SSE with docs-shaped core
        events such as: `response.created`, `response.in_progress`,
        `response.output_item.added`, `response.content_part.added`,
        `response.output_text.delta`, `response.output_text.done`,
        `response.content_part.done`, `response.output_item.done`,
        `response.completed`, plus supported tool-input events like
        `response.function_call_arguments.*` and
        `response.custom_tool_call_input.*`.

        Supported `stream_options` subset:
        - `stream_options.include_obfuscation` controls the synthetic
          `obfuscation` field on shim-owned text/tool delta events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResponseRequest"
            examples:
              minimal:
                summary: Minimal text request
                value:
                  model: test-model
                  store: true
                  input: Say OK and nothing else
              followup:
                summary: Follow up by previous_response_id
                value:
                  model: test-model
                  store: true
                  previous_response_id: resp_prev_123
                  input: What was my code? Reply with just the number.
              conversation:
                summary: Follow up in a conversation
                value:
                  model: test-model
                  store: true
                  conversation: conv_123
                  input: What is the code? Reply with just the number.
              json_mode:
                summary: Local JSON mode subset
                value:
                  model: test-model
                  input: Reply with a JSON object {"ok":true} and nothing else. JSON only.
                  text:
                    format:
                      type: json_object
              json_schema:
                summary: Local JSON schema subset
                value:
                  model: test-model
                  input: Reply with a JSON object containing answer and count.
                  text:
                    format:
                      type: json_schema
                      strict: true
                      schema:
                        type: object
                        properties:
                          answer:
                            type: string
                          count:
                            type: integer
                        required: [answer, count]
                        additionalProperties: false
              streaming:
                summary: Local streaming request with stream options
                value:
                  model: test-model
                  store: true
                  stream: true
                  stream_options:
                    include_obfuscation: false
              file_search_local:
                summary: Local file_search over shim-owned vector stores
                value:
                  model: test-model
                  store: true
                  input: What is the code?
                  tools:
                    - type: file_search
                      vector_store_ids: [vs_local_123]
                      max_num_results: 5
                  tool_choice: required
                  include:
                    - file_search_call.results
                  input: Say OK and nothing else
              code_interpreter_local:
                summary: Dev-only local code_interpreter over shim-managed sandbox backend
                value:
                  model: test-model
                  store: true
                  input: Use Python to calculate 2+2. Return only the numeric result.
                  tools:
                    - type: code_interpreter
                      container:
                        type: auto
                  tool_choice: required
                  include:
                    - code_interpreter_call.outputs
      responses:
        "200":
          description: JSON response or SSE stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
              examples:
                text_response:
                  summary: Completed text response
                  value:
                    id: resp_123
                    object: response
                    created_at: 1741900000
                    status: completed
                    completed_at: 1741900000
                    error: null
                    incomplete_details: null
                    model: test-model
                    background: false
                    store: true
                    text:
                      format:
                        type: text
                    usage: null
                    metadata: {}
                    output_text: OK
                    output:
                      - id: msg_123
                        type: message
                        role: assistant
                        content:
                          - type: output_text
                            text: OK
                custom_tool_call:
                  summary: Custom tool call output item
                  value:
                    id: resp_456
                    object: response
                    created_at: 1741900000
                    status: completed
                    completed_at: 1741900000
                    error: null
                    incomplete_details: null
                    model: test-model
                    background: false
                    store: true
                    text:
                      format:
                        type: text
                    usage: null
                    metadata: {}
                    output_text: ""
                    output:
                      - id: item_456
                        type: custom_tool_call
                        call_id: call_123
                        name: code_exec
                        input: print("hello world")
                        status: completed
            text/event-stream:
              schema:
                type: string
              example: |
                event: response.created
                data: {"type":"response.created","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"","output":[]}}

                event: response.in_progress
                data: {"type":"response.in_progress","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"","output":[]}}

                event: response.output_item.added
                data: {"type":"response.output_item.added","output_index":0,"item":{"id":"msg_123","type":"message","role":"assistant","status":"in_progress","content":[]}}

                event: response.content_part.added
                data: {"type":"response.content_part.added","item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"","annotations":[]}}

                event: response.output_text.delta
                data: {"type":"response.output_text.delta","response_id":"resp_123","item_id":"msg_123","output_index":0,"content_index":0,"delta":"OK","obfuscation":"xx"}

                event: response.output_text.done
                data: {"type":"response.output_text.done","response_id":"resp_123","item_id":"msg_123","output_index":0,"content_index":0,"text":"OK"}

                event: response.content_part.done
                data: {"type":"response.content_part.done","item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"OK","annotations":[]}}

                event: response.output_item.done
                data: {"type":"response.output_item.done","output_index":0,"item":{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"OK","annotations":[]}]}}

                event: response.completed
                data: {"type":"response.completed","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"completed","completed_at":1741900000,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"OK","output":[{"id":"msg_123","type":"message","role":"assistant","content":[{"type":"output_text","text":"OK"}]}]}}

                data: [DONE]
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/input_tokens:
    post:
      tags: [responses]
      summary: Count input tokens for a response request
      x-shim-status: partial
      description: |
        Returns `object: "response.input_tokens"` with an `input_tokens` count.

        Shim behavior:
        - for shim-local stateful requests, the shim expands local
          `previous_response_id`, `conversation`, and synthetic compaction items
          into the effective local context snapshot and returns a deterministic
          token estimate for that rendered snapshot
        - this local count is a compatibility estimate, not backend-native
          tokenization
        - requests that do not depend on shim-local state may be proxied
          upstream unchanged for exact provider-native counting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponseInputTokensRequest"
            examples:
              minimal:
                value:
                  model: test-model
                  input: Count this request
              previous_response:
                value:
                  model: test-model
                  previous_response_id: resp_prev_123
                  input: What was my code?
      responses:
        "200":
          description: Token count result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseInputTokensResource"
              example:
                object: response.input_tokens
                input_tokens: 11
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/compact:
    post:
      tags: [responses]
      summary: Compact a response context window
      x-shim-status: partial
      description: |
        Returns a `response.compaction` resource.

        Shim behavior:
        - local compaction returns a shim-owned opaque `compaction` item whose
          `encrypted_content` can be passed into the next local `/v1/responses`
          request as-is
        - on the next local request, the shim expands that opaque blob into a
          synthetic summary message before generation
        - this is not byte-for-byte equivalent to OpenAI encrypted compaction
          state; it is a compatible local continuation mechanism for the
          shim-supported subset
        - requests that do not depend on shim-local state may be proxied
          upstream unchanged
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponseCompactionRequest"
            examples:
              minimal:
                value:
                  model: test-model
                  input:
                    - type: message
                      role: user
                      content: Remember that the launch code is 777.
                    - type: message
                      role: assistant
                      content:
                        - type: output_text
                          text: I will remember the launch code.
      responses:
        "200":
          description: Shim-owned compaction resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseCompactionResource"
              example:
                id: resp_123
                object: response.compaction
                created_at: 1741900000
                output:
                  - id: cmp_123
                    type: compaction
                    encrypted_content: llama_shim.compaction.v1:ZXhhbXBsZQ
                usage:
                  input_tokens: 42
                  input_tokens_details:
                    cached_tokens: 0
                  output_tokens: 20
                  output_tokens_details:
                    reasoning_tokens: 0
                  total_tokens: 62
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/{id}:
    get:
      tags: [responses]
      summary: Get a stored response
      x-shim-status: partial
      description: |
        Returns a locally stored response when present. If the response is not
        found in shim storage, the request is forwarded to upstream
        `/v1/responses/{id}`.

        Supported shim-owned retrieve query surface for locally stored
        responses:
        - `include` is accepted as a compatibility no-op
        - streamed replay includes a synthetic `obfuscation` field on replayed
          `response.output_text.delta` events by default; set
          `include_obfuscation=false` to disable it
        - `starting_after` skips replayed SSE events up to the given sequence
          number
        - `stream=true` replays the stored response as SSE instead of returning
          a JSON object
        - stored `reasoning` items with `reasoning_text` content parts replay
          specialized `response.reasoning_text.*` events
        - stored `mcp_call` items and legacy stored `mcp_tool_call` items
          replay `response.mcp_call_arguments.*` plus terminal
          `response.mcp_call.in_progress`; failed stored MCP items also replay
          `response.mcp_call.failed`
        - stored `web_search_call` items replay
          `response.web_search_call.in_progress`,
          `response.web_search_call.searching`, and
          `response.web_search_call.completed`; synthetic
          `response.output_item.added` still omits the final `action` until
          `response.output_item.done`
        - stored `file_search_call` items replay
          `response.file_search_call.in_progress`,
          `response.file_search_call.searching`, and
          `response.file_search_call.completed`; synthetic
          `response.output_item.added` still omits final `queries`,
          `results`, and `search_results` until
          `response.output_item.done`
        - stored `code_interpreter_call` items replay
          `response.code_interpreter_call.in_progress`,
          `response.code_interpreter_call_code.delta`,
          `response.code_interpreter_call_code.done`,
          `response.code_interpreter_call.interpreting`, and
          `response.code_interpreter_call.completed`; synthetic
          `response.output_item.added` keeps `code` blank and preserves only
          an empty or `null` `outputs` placeholder until
          `response.output_item.done`
        - trace-backed stored `computer_call` items do not expose a dedicated
          `response.computer_call.*` SSE family in current upstream captures;
          replay therefore stays generic through `response.output_item.*`, and
          synthetic `response.output_item.added` omits final `actions` until
          `response.output_item.done`
        - trace-backed stored `image_generation_call` items replay through
          `response.image_generation_call.in_progress`,
          `response.image_generation_call.generating`,
          `response.image_generation_call.completed`, and terminal
          `response.output_item.done`; synthetic
          `response.output_item.added` follows current upstream captures and
          omits image metadata plus final `result`, `revised_prompt`, and
          `action` until the terminal item, and shim does not claim stored
          replay for `response.image_generation_call.partial_image` without
          recoverable partial-image payloads
        - docs-backed stored `mcp_approval_request` items replay only through
          generic `response.output_item.*`; the documented item shape is
          preserved, shim does not invent a dedicated
          `response.mcp_approval_request.*` SSE family, and synthetic replay
          does not add a `status` field that is absent from the documented
          output item
        - docs-backed stored `mcp_list_tools` items replay only through
          generic `response.output_item.*`; shim preserves the documented
          `server_label` plus imported `tools` list, does not invent a
          dedicated `response.mcp_list_tools.*` SSE family, and does not add a
          synthetic `status` field when the documented item has none
        - other hosted/native tool item families may still fall back to
          generic `response.output_item.*` replay
      parameters:
        - $ref: "#/components/parameters/ResponseID"
        - $ref: "#/components/parameters/ResponseInclude"
        - $ref: "#/components/parameters/ResponseIncludeObfuscation"
        - $ref: "#/components/parameters/ResponseStartingAfter"
        - $ref: "#/components/parameters/ResponseStream"
      responses:
        "200":
          description: Response object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
            text/event-stream:
              schema:
                type: string
              example: |
                event: response.created
                data: {"type":"response.created","sequence_number":1,"response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"instructions":"Be terse.","max_output_tokens":null,"max_tool_calls":null,"error":null,"incomplete_details":null,"model":"test-model","output":[],"parallel_tool_calls":true,"previous_response_id":"","prompt":null,"prompt_cache_key":null,"prompt_cache_retention":null,"reasoning":{"effort":null,"summary":null},"safety_identifier":null,"service_tier":null,"conversation":null,"background":false,"store":true,"temperature":1.0,"text":{"format":{"type":"text"}},"tool_choice":"auto","tools":[],"top_logprobs":null,"top_p":1.0,"truncation":"disabled","usage":null,"user":null,"metadata":{},"output_text":""}}

                event: response.in_progress
                data: {"type":"response.in_progress","sequence_number":2,"response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"instructions":"Be terse.","max_output_tokens":null,"max_tool_calls":null,"error":null,"incomplete_details":null,"model":"test-model","output":[],"parallel_tool_calls":true,"previous_response_id":"","prompt":null,"prompt_cache_key":null,"prompt_cache_retention":null,"reasoning":{"effort":null,"summary":null},"safety_identifier":null,"service_tier":null,"conversation":null,"background":false,"store":true,"temperature":1.0,"text":{"format":{"type":"text"}},"tool_choice":"auto","tools":[],"top_logprobs":null,"top_p":1.0,"truncation":"disabled","usage":null,"user":null,"metadata":{},"output_text":""}}

                event: response.content_part.added
                data: {"type":"response.content_part.added","sequence_number":4,"item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"","annotations":[]}}

                event: response.output_text.delta
                data: {"type":"response.output_text.delta","sequence_number":5,"response_id":"resp_123","item_id":"msg_123","output_index":0,"content_index":0,"delta":"OK","obfuscation":"xx"}

                event: response.content_part.done
                data: {"type":"response.content_part.done","sequence_number":7,"item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"OK","annotations":[]}}

                event: response.completed
                data: {"type":"response.completed","sequence_number":8,"response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"completed","completed_at":1741900000,"instructions":"Be terse.","max_output_tokens":null,"max_tool_calls":null,"error":null,"incomplete_details":null,"model":"test-model","output":[{"id":"msg_123","type":"message","role":"assistant","content":[{"type":"output_text","text":"OK"}]}],"parallel_tool_calls":true,"previous_response_id":"","prompt":null,"prompt_cache_key":null,"prompt_cache_retention":null,"reasoning":{"effort":null,"summary":null},"safety_identifier":null,"service_tier":null,"conversation":null,"background":false,"store":true,"temperature":1.0,"text":{"format":{"type":"text"}},"tool_choice":"auto","tools":[],"top_logprobs":null,"top_p":1.0,"truncation":"disabled","usage":null,"user":null,"metadata":{},"output_text":"OK"}}

                data: [DONE]
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [responses]
      summary: Delete a stored response
      x-shim-status: partial
      description: |
        Deletes a locally stored response when present. If the response is not
        found in shim storage, the request is forwarded to upstream
        `/v1/responses/{id}`.
      parameters:
        - $ref: "#/components/parameters/ResponseID"
      responses:
        "200":
          description: Delete confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseDeletion"
              example:
                id: resp_123
                object: response
                deleted: true
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/{id}/cancel:
    post:
      tags: [responses]
      summary: Cancel a background response
      x-shim-status: partial
      description: |
        Cancels a background response.

        Behavior:
        - locally stored non-background responses are rejected with
          `invalid_request_error`
        - locally stored background responses are proxied upstream and the local
          shadow copy is refreshed from the upstream response object
        - missing local ids are forwarded to upstream `/v1/responses/{id}/cancel`
      parameters:
        - $ref: "#/components/parameters/ResponseID"
      responses:
        "200":
          description: Updated response object after cancellation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/{id}/input_items:
    get:
      tags: [responses]
      summary: List input items for a stored response
      x-shim-status: partial
      description: |
        Returns the locally stored snapshot of input items used to generate the
        response when present. For shim-owned previous-response and
        conversation-backed turns, this includes the effective stateful context
        assembled for generation, not just the current turn's raw input. If the
        response is not found in shim storage, the request is forwarded to
        upstream `/v1/responses/{id}/input_items`.

        Supported shim-owned query surface for locally stored responses:
        - `after`, `limit`, and `order` paginate the locally stored normalized
          input-item snapshot
        - `include` is accepted as a compatibility no-op
      parameters:
        - $ref: "#/components/parameters/ResponseID"
        - $ref: "#/components/parameters/ListAfter"
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListOrder"
        - $ref: "#/components/parameters/ResponseInclude"
      responses:
        "200":
          description: Input items stored for the response generation snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
              example:
                object: list
                data:
                  - id: msg_user_1
                    type: message
                    role: user
                    content:
                      - type: input_text
                        text: Remember code 123
                  - id: msg_assistant_1
                    type: message
                    role: assistant
                    content:
                      - type: output_text
                        text: OK
                  - id: msg_user_2
                    type: message
                    role: user
                    content:
                      - type: input_text
                        text: Tell me more
                first_id: msg_user_1
                last_id: msg_user_2
                has_more: false
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /v1/conversations:
    post:
      tags: [conversations]
      summary: Create a conversation
      x-shim-status: partial
      description: |
        Creates a shim-owned conversation from initial items.

        Compared with the official OpenAI Conversations API surface:
        - empty-body create is supported
        - the shim supports the documented `items` seed flow and lightweight
          string `metadata`
        - the returned conversation resource matches the official top-level
          shape more closely
        - conversation items are accessed through the dedicated item endpoints
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
            example:
              metadata:
                topic: demo
              items:
                - type: message
                  role: system
                  content: You are a test assistant.
                - type: message
                  role: user
                  content: Remember code 777. Reply OK.
      responses:
        "200":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
              example:
                id: conv_123
                object: conversation
                created_at: 1741900000
                metadata:
                  topic: demo
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
  /v1/conversations/{id}:
    get:
      tags: [conversations]
