                event: response.completed
                data: {"type":"response.completed","sequence_number":8,"response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"completed","completed_at":1741900000,"instructions":"Be terse.","max_output_tokens":null,"max_tool_calls":null,"error":null,"incomplete_details":null,"model":"test-model","output":[{"id":"msg_123","type":"message","role":"assistant","content":[{"type":"output_text","text":"OK"}]}],"parallel_tool_calls":true,"previous_response_id":"","prompt":null,"prompt_cache_key":null,"prompt_cache_retention":null,"reasoning":{"effort":null,"summary":null},"safety_identifier":null,"service_tier":null,"conversation":null,"background":false,"store":true,"temperature":1.0,"text":{"format":{"type":"text"}},"tool_choice":"auto","tools":[],"top_logprobs":null,"top_p":1.0,"truncation":"disabled","usage":null,"user":null,"metadata":{},"output_text":"OK"}}

                data: [DONE]
