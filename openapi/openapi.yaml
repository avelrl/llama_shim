        object:
          type: string
          const: response
        created_at:
          type: integer
          format: int64
        status:
          type: string
        completed_at:
          type:
            - integer
            - "null"
          format: int64
        error:
          type:
            - object
            - "null"
          additionalProperties: true
        incomplete_details:
          type:
            - object
            - "null"
          additionalProperties: true
        instructions:
