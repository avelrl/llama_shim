          minimum: 0
    FileChunkingStrategy:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [static]
        static:
          $ref: "#/components/schemas/StaticFileChunkingStrategy"
      description: |
        Returned chunking strategy for the local retrieval subset.
    CreateVectorStoreFileRequest:
      type: object
      required: [file_id]
      properties:
        file_id:
          type: string
        attributes:
          $ref: "#/components/schemas/RetrievalAttributes"
        chunking_strategy:
          description: |
            Request-time chunking strategy. The shim currently supports
            `type=auto` as a compatibility alias for its default static
            chunking and explicit `type=static`.
          oneOf:
            - $ref: "#/components/schemas/FileChunkingStrategy"
            - type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [auto]
    VectorStoreFileError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [server_error, unsupported_file, invalid_file]
        message:
          type: string
    VectorStoreFileObject:
      type: object
      required: [id, object, created_at, usage_bytes, vector_store_id, status]
      properties:
        id:
          type: string
        object:
          type: string
          const: vector_store.file
        created_at:
          type: integer
          format: int64
        usage_bytes:
          type: integer
          format: int64
        vector_store_id:
          type: string
        status:
          type: string
          enum: [in_progress, completed, cancelled, failed]
        last_error:
          oneOf:
            - $ref: "#/components/schemas/VectorStoreFileError"
            - type: "null"
        attributes:
          $ref: "#/components/schemas/RetrievalAttributes"
        chunking_strategy:
          $ref: "#/components/schemas/FileChunkingStrategy"
    VectorStoreFileDeletion:
      type: object
      required: [id, object, deleted]
      properties:
        id:
          type: string
        object:
          type: string
          const: vector_store.file.deleted
        deleted:
          type: boolean
    VectorStoreFileList:
      type: object
      required: [object, data, has_more]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreFileObject"
        first_id:
          type:
            - string
            - "null"
        last_id:
          type:
            - string
            - "null"
        has_more:
          type: boolean
    VectorStoreSearchComparisonFilter:
      type: object
      required: [type, key, value]
      properties:
        type:
          type: string
          enum: [eq, ne, gt, gte, lt, lte, in, nin]
        key:
          type: string
        value:
          oneOf:
            - $ref: "#/components/schemas/RetrievalAttributeValue"
            - type: array
              items:
                $ref: "#/components/schemas/RetrievalAttributeValue"
    VectorStoreSearchCompoundFilter:
      type: object
      required: [type, filters]
      properties:
        type:
          type: string
          enum: [and, or]
        filters:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/VectorStoreSearchFilter"
    VectorStoreSearchFilter:
      oneOf:
        - $ref: "#/components/schemas/VectorStoreSearchComparisonFilter"
        - $ref: "#/components/schemas/VectorStoreSearchCompoundFilter"
    VectorStoreSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                type: string
        filters:
          $ref: "#/components/schemas/VectorStoreSearchFilter"
        max_num_results:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        rewrite_query:
          type: boolean
        ranking_options:
          type: object
          properties:
            ranker:
              type: string
              enum:
                [none, auto, default-2024-08-21, default_2024_08_21]
              description: |
                Local retrieval ranker selection. In shim-local `sqlite_vec`
                mode, omitted `ranker` behaves like `auto`, `none` disables
                the local rerank stage, the canonical public dated value is
                `default-2024-08-21`, and the legacy compatibility alias
                `default_2024_08_21` is also accepted. Both map to the same
                conservative local rerank profile. Exact hosted ranker parity
                is not claimed.
            score_threshold:
              type: number
              minimum: 0
              maximum: 1
            hybrid_search:
              $ref: "#/components/schemas/VectorStoreHybridSearchOptions"
      description: |
        Local vector store search request.

        `rewrite_query=true` applies a small shim-local deterministic
        query-rewrite pass before search and returns the rewritten query (or
        rewritten query array) in `search_query`. Exact hosted rewrite
        parity is not claimed.

        When the semantic retrieval backend (`sqlite_vec`) is enabled,
        `ranking_options.ranker` controls a shim-local rerank layer:
        omitted `ranker` defaults to local `auto`,
        canonical `default-2024-08-21` selects a conservative legacy local
        profile, legacy compatibility alias `default_2024_08_21` is also
        accepted, and `none` disables local reranking.
        `ranking_options.hybrid_search` is also honored in that
        `sqlite_vec` path. Without `sqlite_vec`, the local implementation
        falls back to deterministic lexical search plus optional
        score-threshold filtering.
    VectorStoreHybridSearchOptions:
      type: object
      properties:
        embedding_weight:
          type: number
          minimum: 0
          default: 1
        text_weight:
          type: number
          minimum: 0
          default: 1
      description: |
        Weighted reciprocal-rank-fusion tuning between dense semantic matches
        and sparse keyword matches.
    VectorStoreSearchResultContent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: text
        text:
          type: string
    VectorStoreSearchResult:
      type: object
      required: [file_id, filename, score, content]
      properties:
        file_id:
          type: string
        filename:
          type: string
        score:
          type: number
        attributes:
          $ref: "#/components/schemas/RetrievalAttributes"
        content:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreSearchResultContent"
    VectorStoreSearchResponse:
      type: object
      required: [object, search_query, data, has_more]
      properties:
        object:
          type: string
          const: vector_store.search_results.page
        search_query:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: |
            The query string or query array actually used for search. When
            `rewrite_query=true`, this reflects the shim-local rewritten
            query payload rather than the original request text.
        data:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreSearchResult"
        has_more:
          type: boolean
        next_page:
          type:
            - string
            - "null"
    ChatCompletionsRequest:
      type: object
      description: |
        Minimal validated request for shim `/v1/chat/completions` proxying.

        The official OpenAI Chat Completions API supports many more fields; the
        shim validates only `model` and `messages` before forwarding the request
        upstream and does not claim full ownership of the upstream schema.
      required: [model, messages]
      additionalProperties: true
      properties:
        model:
          type: string
        messages:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
            properties:
              role:
                type: string
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
    ProxyJSONResponse:
      type: object
      additionalProperties: true
    ChatCompletionResource:
      type: object
      description: |
        Sanitized Chat Completion JSON resource shadow-stored locally by the
        shim for successful proxy requests when either `store: true` is
        explicit or omitted-`store` local shadowing is enabled, including the
        current reconstructed streamed subset.
      additionalProperties: true
    StoredChatCompletionMetadataUpdateRequest:
      type: object
      required: [metadata]
      additionalProperties: false
      properties:
        metadata:
          type: object
          additionalProperties:
            type: string
          description: |
            Replacement metadata map for the locally stored Chat Completion.
            This local subset only supports `metadata` updates.
    ChatCompletionDeleted:
      type: object
      required: [id, object, deleted]
      properties:
        id:
          type: string
        object:
          type: string
          const: chat.completion.deleted
        deleted:
          type: boolean
    StoredChatCompletionList:
      type: object
      required: [object, data, has_more]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionResource"
        first_id:
          type: string
          nullable: true
        last_id:
          type: string
          nullable: true
        has_more:
          type: boolean
    StoredChatCompletionMessage:
      type: object
      description: |
        Stored input message entry reconstructed from the request `messages`
        array for a locally shadow-stored Chat Completion.
      additionalProperties: true
      properties:
        id:
          type: string
        role:
          type: string
        content:
          nullable: true
        name:
          type: string
          nullable: true
        content_parts:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
    StoredChatCompletionMessagesList:
      type: object
      required: [object, data, has_more]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/StoredChatCompletionMessage"
        first_id:
          type: string
          nullable: true
        last_id:
          type: string
          nullable: true
        has_more:
          type: boolean
