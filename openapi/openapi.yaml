  /v1/files:
    get:
      tags: [retrieval]
      summary: List locally stored files
      x-shim-status: partial
      description: |
        Returns the shim-owned local file substrate used by retrieval-compatible
        vector stores.

        This route does not enumerate upstream OpenAI files. It implements the
        OpenAI-shaped list surface on top of local SQLite-backed file storage.
      parameters:
        - name: purpose
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 10000
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: after
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Locally stored file list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [retrieval]
      summary: Upload a local file
      x-shim-status: partial
      description: |
        Uploads a file into the shim-owned local file substrate.

        Current local subset:
        - multipart `file` + `purpose`
        - optional `expires_after[anchor]=created_at`
        - optional `expires_after[seconds]`

        Unlike the hosted OpenAI Files API, this local implementation stores
        files only in the shim's SQLite-backed storage and currently enforces a
        local upload limit of 64 MiB per file.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateFileRequest"
      responses:
        "200":
          description: Stored file resource
