        prompt_cache_key:
          $ref: "#/components/schemas/AnyJSON"
        prompt_cache_retention:
          $ref: "#/components/schemas/AnyJSON"
        reasoning:
          $ref: "#/components/schemas/AnyJSON"
        safety_identifier:
          $ref: "#/components/schemas/AnyJSON"
        service_tier:
          $ref: "#/components/schemas/AnyJSON"
        conversation:
          $ref: "#/components/schemas/ConversationReference"
        background:
          type:
            - boolean
            - "null"
        store:
          type:
            - boolean
            - "null"
        temperature:
          $ref: "#/components/schemas/AnyJSON"
        text:
          $ref: "#/components/schemas/ResponseTextConfig"
        tool_choice:
          $ref: "#/components/schemas/AnyJSON"
        tools:
          $ref: "#/components/schemas/AnyJSON"
        top_logprobs:
          $ref: "#/components/schemas/AnyJSON"
        top_p:
          $ref: "#/components/schemas/AnyJSON"
        truncation:
          $ref: "#/components/schemas/AnyJSON"
        usage:
          type:
            - object
            - "null"
          additionalProperties: true
        user:
