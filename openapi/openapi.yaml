  /v1/chat/completions:
    get:
      tags: [chat]
      summary: List locally stored Chat Completions
      x-shim-status: partial
      description: |
        Returns locally shadow-stored Chat Completion resources for successful
        non-streaming `POST /v1/chat/completions` calls created through this
        shim with explicit `store: true`.

        This local read surface does not enumerate upstream-owned stored Chat
        Completions, does not infer account-level default storage when `store`
        is omitted, and does not reconstruct stored resources from streamed
        Chat Completion chunks.
      parameters:
        - name: model
          in: query
          required: false
          schema:
            type: string
        - name: metadata
          in: query
          required: false
          style: deepObject
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
          description: |
            Metadata filter using OpenAI-compatible deep-object query syntax,
            for example `metadata[key]=value`.
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Locally stored chat completion list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredChatCompletionList"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [chat]
      summary: Validate and proxy Chat Completions
      x-shim-status: proxy
      description: |
        Validates a small core of the request (`model`, `messages`) and then
        forwards the request to the upstream backend. Successful JSON responses
        are sanitized to remove some backend-specific fields. SSE responses are
        proxied through unchanged.

        Successful non-streaming JSON responses with explicit `store: true` are
        also shadow-stored locally and become visible via the shim-owned
        `GET /v1/chat/completions`, `GET /v1/chat/completions/{completion_id}`,
        and `GET /v1/chat/completions/{completion_id}/messages` read surface.
        This does not currently cover streamed chat completions or upstream
        account-level default storage when `store` is omitted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
            example:
              model: test-model
              messages:
                - role: user
                  content: Say OK and nothing else
      responses:
        "200":
          description: Upstream JSON or SSE response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyJSONResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/chat/completions/{completion_id}:
    get:
      tags: [chat]
      summary: Retrieve a locally stored Chat Completion
      x-shim-status: partial
      description: |
        Returns a locally shadow-stored Chat Completion created by this shim
        from a successful non-streaming `POST /v1/chat/completions` request
        with explicit `store: true`.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
      responses:
        "200":
          description: Locally stored chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResource"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /v1/chat/completions/{completion_id}/messages:
    get:
      tags: [chat]
      summary: List messages for a locally stored Chat Completion
      x-shim-status: partial
      description: |
        Returns the request `messages` array captured for a locally
        shadow-stored Chat Completion created by this shim from a successful
        non-streaming `POST /v1/chat/completions` request with explicit
        `store: true`.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Message list for a locally stored chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredChatCompletionMessagesList"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
components:
  parameters:
    ResponseID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Response identifier
    ConversationID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Conversation identifier
    ConversationItemID:
      name: item_id
      in: path
      required: true
      schema:
        type: string
      description: Conversation item identifier
    ChatCompletionID:
      name: completion_id
      in: path
      required: true
      schema:
        type: string
      description: Stored Chat Completion identifier
    FileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
      description: Local file identifier
    VectorStoreID:
      name: vector_store_id
      in: path
      required: true
      schema:
        type: string
      description: Local vector store identifier
    ResponseInclude:
      name: include
      in: query
      required: false
      schema:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
      description: |
        OpenAI-compatible include selector list. The shim accepts include
        values for compatibility; locally stored response retrieval currently
        treats them as a no-op.
    ResponseIncludeObfuscation:
      name: include_obfuscation
      in: query
      required: false
      schema:
        type: boolean
      description: |
        Controls whether streamed local response replay includes a synthetic
        `obfuscation` string on replayed `response.output_text.delta` events.
        Defaults to `true`; set `false` to disable it.
    ResponseStartingAfter:
      name: starting_after
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Replay only SSE events with a sequence number greater than this value.
    ResponseStream:
      name: stream
      in: query
      required: false
      schema:
        type: boolean
      description: When `true`, replay a locally stored response as SSE.
    ListAfter:
      name: after
      in: query
      required: false
      schema:
        type: string
      description: Cursor item id after which the next page begins.
    ListLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Number of items to return per page.
    ListOrder:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      description: Sort order for list pagination.
  responses:
    ErrorResponse:
      description: Canonical OpenAI-shaped error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              message: model is required
              type: invalid_request_error
              param: model
              code: null
  schemas:
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [message, type]
      properties:
        message:
          type: string
        type:
          type: string
        param:
          type:
            - string
            - "null"
        code:
          type:
            - string
            - "null"
    CreateResponseRequest:
      type: object
      required: [model, input]
      additionalProperties: true
      properties:
        model:
          type: string
        input:
          $ref: "#/components/schemas/InputField"
        text:
          $ref: "#/components/schemas/ResponseTextConfig"
        metadata:
          type: object
          maxProperties: 16
          propertyNames:
            type: string
            maxLength: 64
          additionalProperties:
            type: string
            maxLength: 512
        store:
          type: boolean
        stream:
          type: boolean
        stream_options:
          $ref: "#/components/schemas/ResponseStreamOptions"
        background:
          type: boolean
        previous_response_id:
          type: string
        conversation:
          $ref: "#/components/schemas/ConversationInputReference"
        instructions:
          type: string
      description: |
        Partial Responses-compatible request body. The shim guarantees only the
        documented core fields; other fields may be handled locally, proxied
        upstream, or rejected depending on `responses.mode`.

        Supported shim-local structured-output subset:
        - `text.format.type=text`
        - `text.format.type=json_object`
        - `text.format.type=json_schema` with a limited schema subset
        - `metadata` follows the documented OpenAI string key/value limits
        - `stream_options.include_obfuscation` for shim-owned SSE and replay
        - pragmatic local `file_search` execution with:
          one `tools[]` entry of `type=file_search`, local `vector_store_ids`,
          optional `filters`, `max_num_results`,
          `ranking_options.score_threshold`,
          `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["file_search_call.results"]`
        - pragmatic dev-only local `code_interpreter` execution with:
          one `tools[]` entry of `type=code_interpreter`,
          `container.type=auto`,
          optional shim-owned `container.file_ids`,
          `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["code_interpreter_call.outputs"]`

        The local `file_search` subset uses deterministic lexical retrieval over
        normalized UTF-8 text chunks. It does not claim hosted semantic-search,
        reranking, or `file_citation` annotation parity.

        The local `code_interpreter` subset is guarded by
        `responses.code_interpreter.backend`. `backend=docker` uses a hardened
        reusable container with no network, read-only rootfs, tmpfs workspace,
        non-root user, dropped capabilities, and memory/cpu/pids limits.
        `backend=unsafe_host` remains an explicitly unsafe fallback. Supported
        local `container.file_ids` values are staged from shim-owned
        `/v1/files` into the current sandbox workspace under sanitized
        filenames. The shim does not yet claim hosted sandbox/container parity
        and does not support automatic `input_file` upload parity, generated
        artifacts, `container_file_citation` annotations, explicit
        `/v1/containers` parity, or user-specified
        `tools[].container = "cntr_..."` mode.

        `background` is forwarded upstream for long-running responses and is not
        executed locally by the shim.
    ResponseInputTokensRequest:
      type: object
      additionalProperties: true
      description: |
        Partial token-count request body.

        Shim-local token counting supports:
        - `model`
        - `input`
        - `previous_response_id`
        - `conversation`
        - `instructions`

        `text` and `metadata` are accepted as compatibility no-ops in the
        shim-local path. Requests with other fields may still be proxied
        upstream when they do not depend on shim-local state.
      properties:
        model:
          type: string
        input:
          $ref: "#/components/schemas/InputField"
        text:
          $ref: "#/components/schemas/ResponseTextConfig"
        metadata:
          type: object
          maxProperties: 16
          propertyNames:
            type: string
            maxLength: 64
          additionalProperties:
            type: string
            maxLength: 512
        previous_response_id:
          type: string
        conversation:
          $ref: "#/components/schemas/ConversationInputReference"
        instructions:
          type: string
        include:
          type: array
          items:
            type: string
        tools:
          $ref: "#/components/schemas/AnyJSON"
        tool_choice:
          $ref: "#/components/schemas/AnyJSON"
        parallel_tool_calls:
          type: boolean
    ResponseCompactionRequest:
      type: object
      required: [model]
      additionalProperties: true
      description: |
        Partial standalone-compaction request body.

        Shim-local compaction supports:
        - `model`
        - `input`
        - `previous_response_id`
        - `conversation`
        - `instructions`

        `text` and `metadata` are accepted as compatibility no-ops in the
        shim-local path. Requests with other fields may still be proxied
        upstream when they do not depend on shim-local state.
      properties:
        model:
          type: string
        input:
          $ref: "#/components/schemas/InputField"
        text:
          $ref: "#/components/schemas/ResponseTextConfig"
        metadata:
          type: object
          maxProperties: 16
          propertyNames:
            type: string
            maxLength: 64
          additionalProperties:
            type: string
            maxLength: 512
        previous_response_id:
          type: string
        conversation:
          $ref: "#/components/schemas/ConversationInputReference"
        instructions:
          type: string
    ResponseStreamOptions:
      type: object
      additionalProperties: false
      properties:
        include_obfuscation:
          type: boolean
      description: |
        Shim-supported subset of OpenAI `stream_options`.

        Only valid when `stream=true`. The shim currently supports:
        - `include_obfuscation`: include or suppress the synthetic
          `obfuscation` field on shim-owned streamed delta events. Defaults to
          `true`.
    InputField:
      description: String input or typed item payload accepted by the shim
      oneOf:
        - type: string
        - $ref: "#/components/schemas/Item"
        - type: array
          items:
            $ref: "#/components/schemas/Item"
    AnyJSON:
      description: Arbitrary JSON value preserved from request or upstream response state.
      oneOf:
        - type: object
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
        - type: "null"
    Response:
      type: object
      description: |
        Shim-owned response resource aligned with the documented OpenAI
        Responses object fields used by create, retrieve, cancel, and local
        replay flows.
      required: [id, object, created_at, status, model, background, store, text, usage, metadata, output_text, output]
      properties:
