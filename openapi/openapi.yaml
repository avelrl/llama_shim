  /v1/conversations/{id}/items:
    post:
      tags: [conversations]
      summary: Create items
      x-shim-status: partial
      description: |
        Create items in a conversation with the given id.

        The shim accepts the official `items` batch shape and returns the added
        items as a list object. As a compatibility extension, legacy single-item
        bodies are also accepted, but they are normalized into the same list
        response contract.
      parameters:
        - $ref: "#/components/parameters/ConversationID"
        - name: include
          in: query
          description: |
            Additional item fields to include in the response. The shim validates
            the documented include values and accepts them as a compatibility
            no-op because stored item payloads are already returned in full.
          schema:
            type: array
            items:
              type: string
              enum:
                - computer_call_output.output.image_url
                - code_interpreter_call.outputs
                - file_search_call.results
                - web_search_call.action.sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationItemsRequest"
            example:
              items:
                - type: message
                  role: user
                  content:
                    - type: input_text
                      text: Hello!
                - type: message
                  role: user
                  content:
                    - type: input_text
                      text: How are you?
      responses:
        "200":
          description: Added conversation items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
              example:
                object: list
                data:
                  - id: msg_abc
                    type: message
                    status: completed
                    role: user
                    content:
                      - type: input_text
                        text: Hello!
                  - id: msg_def
                    type: message
                    status: completed
                    role: user
                    content:
                      - type: input_text
