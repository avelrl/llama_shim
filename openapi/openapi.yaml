  /v1/chat/completions:
    get:
      tags: [chat]
      summary: List stored Chat Completions
      x-shim-status: partial
      description: |
        Returns a local-first stored-chat view. Shim-owned shadow-stored Chat
        Completion resources are the core path; upstream-owned stored Chat
        Completions are only added opportunistically as a compatibility bridge
        when the configured backend supports official stored-chat routes.
        If the backend does not expose those official stored-chat routes, this
        endpoint returns only the shim-owned shadow-stored resources.

        Current local shadow-store subset includes:
        non-streaming JSON responses, reconstructed streamed responses built
        from sanitized upstream chunks, and a shim-owned default policy for
        omitted `store` requests via
        `chat_completions.default_store_when_omitted`.
      parameters:
        - name: model
          in: query
          required: false
          schema:
            type: string
        - name: metadata
          in: query
          required: false
          style: deepObject
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
          description: |
            Metadata filter using OpenAI-compatible deep-object query syntax,
            for example `metadata[key]=value`.
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Stored chat completion list from the shim local-first surface, with optional upstream history when available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredChatCompletionList"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [chat]
      summary: Validate and proxy Chat Completions
      x-shim-status: proxy
      description: |
        Validates a small core of the request (`model`, `messages`) and then
        forwards the request to the upstream backend. Successful JSON responses
        are sanitized to remove some backend-specific fields. SSE responses are
        proxied through unchanged.

        Successful responses are shadow-stored locally whenever either
        `store: true` is explicit or omitted-`store` local shadowing is enabled
        by `chat_completions.default_store_when_omitted`. These resources
        become visible via the shim-owned
        `GET /v1/chat/completions`, `GET /v1/chat/completions/{completion_id}`,
        `POST /v1/chat/completions/{completion_id}`,
        `DELETE /v1/chat/completions/{completion_id}`, and
        `GET /v1/chat/completions/{completion_id}/messages` local stored-chat
        surface. Current local streamed reconstruction subset covers assistant
        text and tool-call-heavy chunk flows reconstructed from sanitized
        upstream chunks. This local stored-chat surface remains available even
        when the configured backend does not implement official stored-chat
        resource routes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionsRequest"
            example:
              model: test-model
              messages:
                - role: user
                  content: Say OK and nothing else
      responses:
        "200":
          description: Upstream JSON or SSE response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProxyJSONResponse"
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/chat/completions/{completion_id}:
    get:
      tags: [chat]
      summary: Retrieve a stored Chat Completion
      x-shim-status: partial
      description: |
        Returns a shim-owned shadow-stored Chat Completion when present;
        otherwise falls back to the upstream stored-chat resource route when
        the configured backend supports it. If the backend lacks that route,
        only shim-owned shadow copies are addressable here.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
      responses:
        "200":
          description: Stored chat completion from the shim local-first surface
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResource"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [chat]
      summary: Update metadata for a stored Chat Completion
      x-shim-status: partial
      description: |
        Updates the `metadata` field for a shim-owned shadow-stored Chat
        Completion when present, otherwise falls back to the upstream stored
        resource route when the configured backend supports it.

        Only `metadata` updates are supported in the shim-owned local subset.
        Best-effort upstream synchronization is ignored when the backend does
        not implement stored-chat update routes.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoredChatCompletionMetadataUpdateRequest"
      responses:
        "200":
          description: Updated stored chat completion from the shim local-first surface
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResource"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [chat]
      summary: Delete a stored Chat Completion
      x-shim-status: partial
      description: |
        Deletes a shim-owned shadow-stored Chat Completion when present and
        best-effort synchronizes the matching upstream stored resource; when no
        local shadow copy exists, falls back to the upstream stored resource
        route when the configured backend supports it.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
      responses:
        "200":
          description: Deletion confirmation for a stored chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionDeleted"
        "404":
          $ref: "#/components/responses/ErrorResponse"
  /v1/chat/completions/{completion_id}/messages:
    get:
      tags: [chat]
      summary: List messages for a stored Chat Completion
      x-shim-status: partial
      description: |
        Returns the request `messages` array captured for a shim-owned
        shadow-stored Chat Completion when present, otherwise falls back to the
        upstream stored resource route when the configured backend supports it.
        If the backend lacks this route, only shim-owned shadow copies expose
        a messages list.
      parameters:
        - $ref: "#/components/parameters/ChatCompletionID"
        - name: after
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Message list for a stored chat completion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredChatCompletionMessagesList"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
components:
  parameters:
    ResponseID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Response identifier
    ConversationID:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Conversation identifier
    ConversationItemID:
      name: item_id
      in: path
      required: true
      schema:
        type: string
      description: Conversation item identifier
    ChatCompletionID:
      name: completion_id
      in: path
      required: true
      schema:
        type: string
      description: Stored Chat Completion identifier
    FileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
      description: Local file identifier
    ContainerID:
      name: container_id
      in: path
      required: true
      schema:
        type: string
      description: Local code interpreter container identifier
    ContainerFileID:
      name: file_id
      in: path
      required: true
      schema:
        type: string
      description: Local code interpreter container file identifier
    VectorStoreID:
      name: vector_store_id
      in: path
      required: true
      schema:
        type: string
      description: Local vector store identifier
    ResponseInclude:
      name: include
      in: query
      required: false
      schema:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
      description: |
        OpenAI-compatible include selector list. The shim accepts include
        values for compatibility; locally stored response retrieval currently
        treats them as a no-op.
    ResponseIncludeObfuscation:
      name: include_obfuscation
      in: query
      required: false
      schema:
        type: boolean
      description: |
        Controls whether streamed local response replay includes a synthetic
        `obfuscation` string on replayed `response.output_text.delta` events.
        Defaults to `true`; set `false` to disable it.
    ResponseStartingAfter:
      name: starting_after
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
      description: Replay only SSE events with a sequence number greater than this value.
    ResponseStream:
      name: stream
      in: query
      required: false
      schema:
        type: boolean
      description: When `true`, replay a locally stored response as SSE.
    ListAfter:
      name: after
      in: query
      required: false
      schema:
        type: string
      description: Cursor item id after which the next page begins.
    ListLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: Number of items to return per page.
    ListOrder:
      name: order
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
      description: Sort order for list pagination.
  responses:
    ErrorResponse:
      description: Canonical OpenAI-shaped error envelope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              message: model is required
              type: invalid_request_error
              param: model
              code: null
  schemas:
    StatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/APIError"
    APIError:
      type: object
      required: [message, type]
      properties:
        message:
          type: string
        type:
          type: string
        param:
          type:
            - string
            - "null"
        code:
          type:
            - string
            - "null"
    CreateResponseRequest:
      type: object
      required: [model, input]
      additionalProperties: true
      properties:
        model:
          type: string
        input:
          $ref: "#/components/schemas/InputField"
        text:
          $ref: "#/components/schemas/ResponseTextConfig"
        metadata:
          type: object
          maxProperties: 16
          propertyNames:
            type: string
            maxLength: 64
          additionalProperties:
            type: string
            maxLength: 512
        context_management:
          $ref: "#/components/schemas/ResponseContextManagement"
        store:
          type: boolean
        stream:
          type: boolean
        stream_options:
          $ref: "#/components/schemas/ResponseStreamOptions"
        background:
          type: boolean
        previous_response_id:
          type: string
        conversation:
          $ref: "#/components/schemas/ConversationInputReference"
        instructions:
          type: string
      description: |
        Partial Responses-compatible request body. The shim guarantees only the
        documented core fields; other fields may be handled locally, proxied
        upstream, or rejected depending on `responses.mode`.

        Supported shim-local structured-output subset:
        - `text.format.type=text`
        - `text.format.type=json_object`
        - `text.format.type=json_schema` with a limited schema subset
        - `metadata` follows the documented OpenAI string key/value limits
        - `context_management=[{"type":"compaction","compact_threshold":N}]`
          enables a shim-local non-stream automatic compaction subset for the
          core text/stateful local path: the shim can compact prior local
          history before generation, prepend a `compaction` item to the final
          output, and trim future local follow-up history from the latest
          compaction item
        - `stream_options.include_obfuscation` for shim-owned SSE and replay
        - pragmatic local `file_search` execution with:
          one `tools[]` entry of `type=file_search`, local `vector_store_ids`,
          optional `filters`, `max_num_results`,
          `ranking_options.score_threshold`,
          `ranking_options.hybrid_search`,
          `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["file_search_call.results"]`
        - pragmatic dev-only local `code_interpreter` execution with:
          one `tools[]` entry of `type=code_interpreter`,
          `container.type=auto` or explicit `tools[].container="cntr_*"`,
          optional shim-owned `container.file_ids`,
          `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["code_interpreter_call.outputs"]`
        - pragmatic local `computer` execution with:
          one `tools[]` entry of `type=computer`,
          `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["computer_call_output.output.image_url"]`

        The local `file_search` subset uses deterministic lexical retrieval by
        default and can use exact dense semantic search via per-store
        `sqlite-vec` `vec0` KNN tables plus weighted hybrid ranking and a
        local rerank layer when
        `retrieval.index.backend=sqlite_vec` and a retrieval embedder are
        configured. Omitted `ranking_options.ranker` defaults to local
        `auto`; `ranker=none` disables that local rerank stage. When the
        configured embedder model or vector dimensions change, the shim lazy
        reindexes stale chunks in the queried `vector_store` before semantic
        search. Before local retrieval, the shim also applies a small
        deterministic query-rewrite pass and can fan a complex prompt out into
        several rewritten search queries. Raw search results retain a small
        per-file multi-snippet subset instead of collapsing each file to one
        best chunk immediately, and local `/v1/responses` `file_search`
        injects only a bounded 20-chunk grounding subset before final answer
        generation. The final local assistant `message` now carries a
        pragmatic shim-local `file_citation` subset using
        `{type,index,file_id,filename}` annotations for top-ranked retrieved
        files, but the shim does not claim hosted reranking, hosted
        query-planning, or exact hosted file-citation placement/selection
        parity.

        The local `code_interpreter` subset is guarded by
        `responses.code_interpreter.backend`. `backend=docker` uses a hardened
        reusable container with no network, read-only rootfs, tmpfs workspace,
        non-root user, dropped capabilities, and memory/cpu/pids limits.
        `backend=unsafe_host` remains an explicitly unsafe fallback. Supported
        local `container.file_ids` values are staged from shim-owned
        `/v1/files` into the current sandbox workspace under sanitized
        filenames, and current-turn `input_file.file_id` /
        `input_file.file_data` / HTTP(S) `input_file.file_url` message content
        parts are auto-staged into that workspace as the pragmatic local
        subset. For self-hosted safety, `input_file.file_url` fetches are
        disabled by default and require
        `responses.code_interpreter.input_file_url_policy=allowlist` or
        `unsafe_allow_http_https`; allowlisted mode matches exact hosts or
        wildcard suffixes like `*.example.com`. The shim now exposes
        local `/v1/containers` and `/v1/containers/{container_id}/files`
        surfaces over the same session store and restores persisted container
        files into the hardened Docker workspace when a reusable local runtime
        disappears. Small new/changed generated files are persisted as
        shim-owned `/v1/files`, mirrored into shim-owned container files, and
        exposed through local `/v1/containers/{container_id}/files*`. The
        current local `include=["code_interpreter_call.outputs"]` subset is
        logs-only. When generated files exist, the final local assistant
        message prefers inline exact-filename mentions for pragmatic
        `container_file_citation` metadata using shim-owned `cfile_*` ids;
        for unmentioned files the shim appends a fallback `Generated files:`
        appendix and annotates those filenames there. Stored/local streaming
        replay now synthesize generic `response.output_text.annotation.added`
        events for those final annotations. Live upstream traces confirm that
        ordinary Python/tool errors still complete the response with
        `code_interpreter_call.status=completed`, empty `outputs`, no
        top-level `response.error`, and a final assistant message; shim-local
        infra/runtime failures like timeout remain a pragmatic
        `response.status=failed` subset. Expired shim-managed containers
        are swept in the
        background using `responses.code_interpreter.cleanup_interval`,
        clearing local container-file access while keeping container metadata as
        `status=expired`; shim-owned mirrored backing `/v1/files` for
        generated and container-owned uploaded files are garbage-collected on
        replace, delete, delete-container, and expiry. The shim does not yet
        claim hosted sandbox/container parity, broader hosted
        `code_interpreter_call.outputs` parity beyond the currently verified
        logs-only subset, exact hosted citation placement parity, or richer
        hosted failure/artifact semantics.

        The local `computer` subset is guarded by
        `responses.computer.backend=chat_completions`. The shim runs a
        docs-aligned external loop over the configured `/v1/chat/completions`
        backend: the first local turn can return a screenshot-first
        `computer_call`, follow-up turns can send
        `computer_call_output` with a screenshot payload, and the planner can
        then return another `computer_call` or a final assistant `message`.
        Current-turn `computer_call_output` screenshots are projected into the
        planner request as multimodal image context, while stored
        `previous_response_id` lineage keeps the latest local loop state.
        Streamed create and stored retrieve stay generic through
        `response.output_item.*`; the shim does not invent a dedicated
        `response.computer_call.*` family because the public guide confirms
        the loop shape but current upstream captures do not document a
        specialized stored replay family. Exact hosted computer-use planner
        behavior, broader action payload parity, and richer hosted
        failure/status semantics remain open.

        `background` is forwarded upstream for long-running responses and is not
        executed locally by the shim.
    ResponseContextManagement:
      type: array
      description: |
        Docs-aligned `context_management` policy array for `POST /v1/responses`.

        Current shim-local validation accepts only the documented compaction
        policy subset:
        - `[{ "type": "compaction", "compact_threshold": <positive integer> }]`

        Current shim-local execution supports a conservative non-stream subset
        on the core local text/stateful path:
        - compact prior local history before generation when the estimated
          rendered context exceeds the threshold
        - prepend the resulting `compaction` item to the final response output
        - trim future local follow-up history from the latest compaction item

        Streamed create and exact hosted SSE choreography for automatic
        compaction remain out of scope for this subset. Requests that do not
        fit the local subset can still proxy upstream according to
        `responses.mode`.
      items:
        $ref: "#/components/schemas/ResponseContextManagementCompactionPolicy"
    ResponseContextManagementCompactionPolicy:
      type: object
      additionalProperties: false
      required: [type, compact_threshold]
