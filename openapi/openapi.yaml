openapi: 3.1.0
info:
  title: llama_shim API
  version: 0.1.0
  summary: Minimal OpenAI-compatible surface owned by llama_shim
  description: |
    Versioned API contract for the routes currently implemented or explicitly
    owned by `llama_shim`.

    The spec is intentionally narrow:
    - only routes that exist in the current server are documented
    - operation status is marked with `x-shim-status`
    - `implemented` means the shim owns the route contract
    - `partial` means the shim owns only part of the route behavior or request surface
    - `proxy` means the route is validated and then forwarded to the upstream backend

    Notes:
    - `/v1/responses` is local-first for the supported subset and may still proxy
      unsupported features upstream depending on `responses.mode`
    - the shim may enforce optional ingress bearer auth, request rate limiting,
      request/upload/runtime quotas, and a shim-owned `/metrics` endpoint;
      these are operational controls owned by the shim, not OpenAI parity
      claims
    - item payloads are intentionally described as typed open objects because the
      shim preserves normalized raw item bodies across several Responses and
      Conversations flows
servers:
  - url: http://127.0.0.1:8080
tags:
  - name: health
  - name: ops
  - name: responses
  - name: conversations
  - name: chat
  - name: retrieval
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      x-shim-status: implemented
      responses:
        "200":
          description: Service process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ok
        "405":
          $ref: "#/components/responses/ErrorResponse"
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      x-shim-status: implemented
      description: |
        Returns `200` only when the SQLite store is reachable, the configured
        upstream llama-compatible backend responds successfully to
        `GET /v1/models` with a models-list payload, and, when
        `retrieval.index.backend=sqlite_vec` is enabled with a readiness-aware
        embedder backend such as `embedanything`, the local retrieval embedder
        is also reachable. When `responses.web_search.backend=searxng` is
        enabled, `/readyz` also checks that the configured web-search backend
        is reachable. When `responses.image_generation.backend=responses` is
        enabled, `/readyz` also checks that the configured image-generation
        `/v1/responses` backend is reachable.
      responses:
        "200":
          description: SQLite store, upstream backend, and any configured retrieval, web-search, or image-generation backends are reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ready
        "503":
          description: SQLite store, upstream backend, or configured retrieval embedder is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  message: retrieval embedder is not ready
                  type: service_unavailable
                  param: null
                  code: null
        "405":
          $ref: "#/components/responses/ErrorResponse"
  /metrics:
    get:
      tags: [ops]
      summary: Shim-owned metrics endpoint
      x-shim-status: implemented
      description: |
        Returns a shim-owned Prometheus-text exposition for request, auth,
        rate-limit, retrieval, local code-interpreter, and in-flight
        operation metrics.

        Notes:
        - this route is shim-owned operational surface, not an OpenAI API
          parity claim
        - when shim ingress auth is enabled, `/metrics` shares the same bearer
          requirement
        - when shim request rate limiting is enabled, `/metrics` is excluded
          from that limiter so probes and scrapers do not consume request
          budget
      responses:
        "200":
          description: Prometheus-text metrics payload
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP shim_http_requests_total Total HTTP requests handled by the shim.
                # TYPE shim_http_requests_total counter
                shim_http_requests_total{method="GET",route="/healthz",status="200"} 1
        "401":
          description: Missing or invalid shim ingress bearer token when auth is enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  message: missing or invalid bearer token
                  type: authentication_error
                  param: null
                  code: null
        "405":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses:
    post:
      tags: [responses]
      summary: Create a response
      x-shim-status: partial
      description: |
        Creates a response using the shim-owned Responses surface.

        The request body is a partial OpenAI Responses-compatible object:
        - core fields such as `model`, `input`, `store`, `stream`,
          `previous_response_id`, `conversation`, and `instructions` are owned
          by the shim
        - `metadata` is validated and preserved on shim-local responses
        - shim-local structured outputs support `text.format.type=text`,
          `json_object`, and a documented `json_schema` subset
        - shim-local retrieval supports a pragmatic `file_search` subset over
          shim-owned local `vector_stores`
        - `background` is passed through to upstream `/v1/responses`; the shim
          does not execute background responses locally
        - a supported local subset is executed entirely inside the shim
        - `responses.mode=prefer_local` is the default and runs supported
          shim-local subsets first
        - `responses.mode=prefer_upstream` keeps standalone create requests
          proxy-first even when a shim-local subset exists
        - in `responses.mode=prefer_upstream`, standalone hosted/native tool
          requests stay on the upstream path; if the upstream backend rejects a
          tool family, the shim surfaces that upstream validation error instead
          of silently rerouting to a shim-local runtime
        - `responses.mode=local_only` never calls upstream; disabled local
          runtimes for `web_search`, `image_generation`, `computer`, and
          `code_interpreter` return explicit validation errors, while
          proxy-only hosted forms like MCP connectors and client
          `tool_search` return local validation errors instead of a generic
          unsupported-mode response
        - unsupported fields may be proxied to upstream `/v1/responses` when
          `responses.mode` allows it

        Notes for the local structured-output subset:
        - `text.format.type=json_object` follows the OpenAI JSON mode guardrail
          and requires the string `JSON` to appear somewhere in the request
          context
        - `text.format.type=json_schema` supports a limited schema subset:
          `object|array|string|number|integer|boolean|null` plus
          `properties`, `required`, `additionalProperties`, `items`, and `enum`

        Notes for the local `file_search` subset:
        - the shim executes one `file_search` tool locally against shim-owned
          `vector_store_ids`
        - supported local knobs are `filters`, `max_num_results`,
          `ranking_options.ranker`,
          `ranking_options.score_threshold`,
          `ranking_options.hybrid_search`, and
          `include=["file_search_call.results"]`
        - when `include=["file_search_call.results"]` is used, local result
          entries carry snippet `content[]` arrays rather than only a
          flattened shim-local text field
        - search uses deterministic local lexical retrieval by default and can
          use exact dense semantic search via per-store `sqlite-vec` `vec0`
          KNN tables plus weighted hybrid ranking and a shim-local rerank
          stage when `retrieval.index.backend=sqlite_vec` and a retrieval
          embedder are configured; omitted
          `ranking_options.ranker` defaults to local `auto`, and
          `ranker=none` disables that local rerank stage; the shim lazy
          reindexes stale chunks in the queried `vector_store` when the
          configured embedder model or vector dimensions change, and still
          does not claim hosted reranking or full hosted semantic-search
          parity
        - before local retrieval, the shim applies a small deterministic
          query-rewrite pass and can fan a complex prompt out into several
          rewritten search queries; this is a pragmatic local planning subset,
          not exact hosted `file_search` planner parity
        - raw search results retain a small per-file multi-snippet subset
          instead of collapsing each file to one best chunk immediately, and
          local `/v1/responses` `file_search` injects only a bounded 20-chunk
          grounding subset before final answer generation
        - the shim returns `file_search_call` output items and stored/streaming
          replay, and the final local assistant `message` now carries a
          pragmatic shim-local `file_citation` subset using
          `{type,index,file_id,filename}` annotations for top-ranked retrieved
          files; exact hosted file-citation placement/selection parity remains
          open

        Notes for the local `web_search` subset:
        - the shim can execute one `web_search` or `web_search_preview` tool
          locally when `responses.web_search.backend` is configured
        - the local subset accepts `search_context_size`,
          `include=["web_search_call.action.sources"]`, and a pragmatic
          `filters` subset for `web_search`; `web_search_preview` rejects
          `filters` in shim-local mode
        - local execution uses deterministic query planning/rewrite, a
          configurable SearXNG backend for search, heuristic `open_page` /
          `find_in_page` follow-up when the prompt clearly asks to inspect a
          page, and final assistant `url_citation` annotations
        - when `responses.mode=local_only` selects this subset without a
          configured backend, the shim returns an explicit validation error
          pointing at `responses.web_search.backend`
        - `web_search_preview` ignores `external_web_access` in line with the
          public tool guide; `web_search.external_web_access=false` is not
          emulated locally, so when local routing is selected for the GA tool,
          this shape falls back or errors according to `responses.mode`
        - exact hosted planner behavior, broader live-web semantics, and full
          hosted failure choreography remain open

        Notes for the local `image_generation` subset:
        - the shim can execute one `image_generation` tool locally when
          `responses.image_generation.backend=responses` is configured
        - local execution delegates the tool call to a separate
          OpenAI-compatible `/v1/responses` image backend instead of
          proxying through the main upstream text-generation backend
        - non-stream and stream create paths are supported, and stored/retrieve
          replay remains consistent with persisted `image_generation_call`
          items
        - current-turn `input_image` parts and local
          `previous_response_id` image-edit lineage are flattened into the
          shim-owned Responses `input` that is forwarded to the configured
          image backend
        - when the backend stream emits
          `response.image_generation_call.partial_image`, the shim persists
          those irrecoverable artifacts and replays them on stored
          `GET /v1/responses/{id}?stream=true`
        - exact hosted live-stream timing and broader hosted
          planner/failure choreography remain open

        Notes for the local `computer` subset:
        - the shim can execute one `computer` tool locally when
          `responses.computer.backend=chat_completions` is configured
        - the local subset accepts `tool_choice=auto|required`,
          `parallel_tool_calls`, and
          `include=["computer_call_output.output.image_url"]`
        - local execution uses a docs-aligned external loop:
          screenshot-first `computer_call`, follow-up
          `computer_call_output` screenshot input, and either another
          `computer_call` or a final assistant `message`
        - current-turn `computer_call_output` screenshots are projected into
          the shim-owned planner request as multimodal image context, and
          stored `previous_response_id` lineage preserves the latest loop
          state across follow-up turns
        - create-stream and stored retrieve-stream stay generic through
          `response.output_item.*`; current upstream captures do not document
          a dedicated `response.computer_call.*` SSE family, so the shim does
          not invent one
        - exact hosted computer-use planner behavior, broader action-shape
          edge cases, and full hosted failure/status choreography remain open

        Notes for the local `code_interpreter` subset:
        - the shim executes one `code_interpreter` tool locally only when
          `responses.code_interpreter.backend` is set to `docker` or
          `unsafe_host`
        - the supported local subset accepts either `container.type=auto` or
          explicit shim-managed `tools[].container = "cntr_*"` values,
          supports OpenAI-shaped local `/v1/containers` and
          `/v1/containers/{container_id}/files` resources,
          optionally accepts shim-owned `container.file_ids`,
          accepts `tool_choice=auto|required`,
          accepts `include=["code_interpreter_call.outputs"]`,
          and returns stored/streaming `code_interpreter_call` items
        - `container.type=auto` reuses the last active shim-owned
          `code_interpreter_call.container_id` in stored lineage for the same
          backend, or creates a new `cntr_*` session if no prior container is
          available
        - supported `container.file_ids` values are staged from local
          `/v1/files` into the current sandbox workspace under sanitized
          filenames before execution
        - explicit containers and persisted auto containers restore their
          shim-owned container files into the hardened Docker workspace if the
          local runtime disappears, so `cntr_*` reuse remains stable across
          transient runtime loss
        - generated files from the local sandbox are captured in a bounded
          shim-owned subset: small new/changed workspace files are saved into
          local `/v1/files`, mirrored into local container files, exposed
          through local `/v1/containers/{container_id}/files*`, and made
          visible to the final local assistant turn; the current local
          `include=["code_interpreter_call.outputs"]` subset is logs-only
        - when generated files exist, the final local assistant message
          prefers inline exact-filename mentions for pragmatic
          `container_file_citation` annotations using shim-owned `cfile_*`
          container file identifiers; for unmentioned files, the shim appends
          a fallback `Generated files:` appendix and annotates those
          filenames there
        - `backend=docker` uses a hardened reusable session-container boundary;
          `backend=unsafe_host` remains a development fallback and legacy
          compatibility path
        - current-turn `input_file` model content parts are auto-staged into
          the local sandbox workspace for `input_file.file_id`,
          `input_file.file_data`, and HTTP(S) `input_file.file_url`;
          `file_url` fetches use a local 50 MiB cap and are disabled by
          default unless
          `responses.code_interpreter.input_file_url_policy` is set to
          `allowlist` or `unsafe_allow_http_https`
        - stored/local streaming replay now synthesize generic
          `response.output_text.annotation.added` events when the final
          assistant message contains annotations; this is a pragmatic replay
          subset, not a claim of exact hosted annotation placement parity
        - docs-backed proxy/upstream contract accepts hosted and client
          `tool_search`; client follow-up may send `tool_search_output`
          items in `input`, upstream-returned `tool_search_call` /
          `tool_search_output` items are preserved as typed response items,
          and shim-local `responses.mode=prefer_local|local_only` now
          supports a hosted/server `tool_search` subset over deferred
          top-level functions and all-deferred namespaces while client
          execution remains proxy-only and is rejected with a local
          validation error in `responses.mode=local_only`
        - shim-local `responses.mode=prefer_local|local_only` also supports a
          pragmatic remote MCP subset for request-declared `mcp`
          `server_url` tools: imported tools are surfaced through
          `mcp_list_tools`, cached across `previous_response_id`, approvals
          flow through `mcp_approval_request` /
          `mcp_approval_response`, successful execution emits real `mcp_call`,
          and the shim-local client now supports `authorization`, custom
          `headers`, and both legacy HTTP/SSE and basic streamable HTTP MCP
          transports; connectors remain an upstream-only compatibility bridge
          for execution, but connector-aware MCP validation and visible
          request-surface sanitization are now part of the shim-owned subset,
          and `responses.mode=local_only` rejects `connector_id` requests
          with the MCP-specific local validation error instead of a generic
          mode failure
        - live upstream traces now confirm that ordinary Python/tool errors in
          Code Interpreter complete as `response.status=completed` with
          `code_interpreter_call.status=completed`, empty `outputs`, no
          top-level `response.error`, and a final assistant message; the shim
          mirrors that captured subset locally
        - shim-local infrastructure/runtime failures such as timeout or lost
          session still return a pragmatic `response.status=failed` subset
          with `response.error.code/message` and terminal `response.failed`
        - expired shim-managed containers are now swept in the background using
          `responses.code_interpreter.cleanup_interval`; local container
          metadata stays visible as `status=expired`, while local
          `/v1/containers/{container_id}/files*` access is removed after
          expiry; shim-owned mirrored backing `/v1/files` for generated and
          container-owned uploaded files are garbage-collected on replace,
          delete, delete-container, and expiry
        - the local subset does not yet claim full hosted sandbox/container
          lifecycle parity, broader hosted `code_interpreter_call.outputs`
          parity beyond the currently verified logs-only subset, exact hosted
          citation placement parity, broader hosted infra/status surface, or
          richer hosted failure/artifact semantics

        Retention semantics:
        - standalone responses follow the outward `store` contract returned on
          the response object
        - conversation-attached items follow the conversation lifecycle and are
          not subject to standalone response retention
        - the shim may persist hidden response rows needed for local
          `previous_response_id` replay even when the outward response reports
          `store=false`

        When `stream=true`, the response is emitted as SSE with docs-shaped core
        events such as: `response.created`, `response.in_progress`,
        `response.output_item.added`, `response.content_part.added`,
        `response.output_text.delta`, `response.output_text.done`,
        `response.content_part.done`, `response.output_item.done`,
        `response.completed`, plus supported tool-input events like
        `response.function_call_arguments.*` and
        `response.custom_tool_call_input.*`.

        Supported `stream_options` subset:
        - `stream_options.include_obfuscation` controls the synthetic
          `obfuscation` field on shim-owned text/tool delta events

        Shim-local custom tools subset:
        - plain-text custom tools stay on the bridge/function-call compatibility path
        - supported `grammar` / `regex` custom tools stay shim-local and preserve
          native `custom_tool_call` output items
        - when `tool_choice` names a supported constrained custom tool, or
          `tool_choice: "required"` is used with a single constrained custom
          tool, the shim first attempts backend-native structured generation of
          raw `input` through `/v1/chat/completions`
        - broader auto/mixed constrained-tool cases use a shim-local tool
          selector plus backend-native constrained generation for the selected
          custom tool, including a shim-local `tool_choice.type=allowed_tools`
          subset for function/custom tools
        - legacy shim-local validation/repair remains only as an error fallback,
          not the happy-path enforcement mechanism; this is still not full
          spec-equivalent single-pass constrained decoding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResponseRequest"
            examples:
              minimal:
                summary: Minimal text request
                value:
                  model: test-model
                  store: true
                  input: Say OK and nothing else
              followup:
                summary: Follow up by previous_response_id
                value:
                  model: test-model
                  store: true
                  previous_response_id: resp_prev_123
                  input: What was my code? Reply with just the number.
              conversation:
                summary: Follow up in a conversation
                value:
                  model: test-model
                  store: true
                  conversation: conv_123
                  input: What is the code? Reply with just the number.
              json_mode:
                summary: Local JSON mode subset
                value:
                  model: test-model
                  input: Reply with a JSON object {"ok":true} and nothing else. JSON only.
                  text:
                    format:
                      type: json_object
              json_schema:
                summary: Local JSON schema subset
                value:
                  model: test-model
                  input: Reply with a JSON object containing answer and count.
                  text:
                    format:
                      type: json_schema
                      strict: true
                      schema:
                        type: object
                        properties:
                          answer:
                            type: string
                          count:
                            type: integer
                        required: [answer, count]
                        additionalProperties: false
              streaming:
                summary: Local streaming request with stream options
                value:
                  model: test-model
                  store: true
                  stream: true
                  stream_options:
                    include_obfuscation: false
              file_search_local:
                summary: Local file_search over shim-owned vector stores
                value:
                  model: test-model
                  store: true
                  input: What is the code?
                  tools:
                    - type: file_search
                      vector_store_ids: [vs_local_123]
                      max_num_results: 5
                  tool_choice: required
                  include:
                    - file_search_call.results
                  input: Say OK and nothing else
              code_interpreter_local:
                summary: Dev-only local code_interpreter over shim-managed sandbox backend
                value:
                  model: test-model
                  store: true
                  input: Use Python to calculate 2+2. Return only the numeric result.
                  tools:
                    - type: code_interpreter
                      container:
                        type: auto
                  tool_choice: required
                  include:
                    - code_interpreter_call.outputs
              computer_local:
                summary: Docs-aligned local computer loop over chat completions
                value:
                  model: test-model
                  store: true
                  input: Use the computer tool. First request a screenshot.
                  tools:
                    - type: computer
                  tool_choice: required
                  include:
                    - computer_call_output.output.image_url
      responses:
        "200":
          description: JSON response or SSE stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"
              examples:
                text_response:
                  summary: Completed text response
                  value:
                    id: resp_123
                    object: response
                    created_at: 1741900000
                    status: completed
                    completed_at: 1741900000
                    error: null
                    incomplete_details: null
                    model: test-model
                    background: false
                    store: true
                    text:
                      format:
                        type: text
                    usage: null
                    metadata: {}
                    output_text: OK
                    output:
                      - id: msg_123
                        type: message
                        role: assistant
                        content:
                          - type: output_text
                            text: OK
                custom_tool_call:
                  summary: Custom tool call output item
                  value:
                    id: resp_456
                    object: response
                    created_at: 1741900000
                    status: completed
                    completed_at: 1741900000
                    error: null
                    incomplete_details: null
                    model: test-model
                    background: false
                    store: true
                    text:
                      format:
                        type: text
                    usage: null
                    metadata: {}
                    output_text: ""
                    output:
                      - id: item_456
                        type: custom_tool_call
                        call_id: call_123
                        name: code_exec
                        input: print("hello world")
                        status: completed
            text/event-stream:
              schema:
                type: string
              example: |
                event: response.created
                data: {"type":"response.created","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"","output":[]}}

                event: response.in_progress
                data: {"type":"response.in_progress","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"in_progress","completed_at":null,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"","output":[]}}

                event: response.output_item.added
                data: {"type":"response.output_item.added","output_index":0,"item":{"id":"msg_123","type":"message","role":"assistant","status":"in_progress","content":[]}}

                event: response.content_part.added
                data: {"type":"response.content_part.added","item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"","annotations":[]}}

                event: response.output_text.delta
                data: {"type":"response.output_text.delta","response_id":"resp_123","item_id":"msg_123","output_index":0,"content_index":0,"delta":"OK","obfuscation":"xx"}

                event: response.output_text.done
                data: {"type":"response.output_text.done","response_id":"resp_123","item_id":"msg_123","output_index":0,"content_index":0,"text":"OK"}

                event: response.content_part.done
                data: {"type":"response.content_part.done","item_id":"msg_123","output_index":0,"content_index":0,"part":{"type":"output_text","text":"OK","annotations":[]}}

                event: response.output_item.done
                data: {"type":"response.output_item.done","output_index":0,"item":{"id":"msg_123","type":"message","role":"assistant","status":"completed","content":[{"type":"output_text","text":"OK","annotations":[]}]}}

                event: response.completed
                data: {"type":"response.completed","response":{"id":"resp_123","object":"response","created_at":1741900000,"status":"completed","completed_at":1741900000,"error":null,"incomplete_details":null,"model":"test-model","background":false,"store":true,"text":{"format":{"type":"text"}},"usage":null,"metadata":{},"output_text":"OK","output":[{"id":"msg_123","type":"message","role":"assistant","content":[{"type":"output_text","text":"OK"}]}]}}

                data: [DONE]
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "502":
          $ref: "#/components/responses/ErrorResponse"
        "504":
          $ref: "#/components/responses/ErrorResponse"
  /v1/responses/input_tokens:
    post:
      tags: [responses]
      summary: Count input tokens for a response request
      x-shim-status: partial
      description: |
        Returns `object: "response.input_tokens"` with an `input_tokens` count.

        Shim behavior:
        - for shim-local stateful requests, the shim expands local
          `previous_response_id`, `conversation`, and synthetic compaction items
          into the effective local context snapshot and returns a deterministic
          token estimate for that rendered snapshot
        - this local count is a compatibility estimate, not backend-native
          tokenization
        - requests that do not depend on shim-local state may be proxied
          upstream unchanged for exact provider-native counting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponseInputTokensRequest"
            examples:
              minimal:
                value:
                  model: test-model
                  input: Count this request
              previous_response:
                value:
                  model: test-model
                  previous_response_id: resp_prev_123
                  input: What was my code?
      responses:
        "200":
          description: Token count result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseInputTokensResource"
              example:
                object: response.input_tokens
                input_tokens: 11
        "400":
