          type: string
          const: vector_store.search_results.page
        search_query:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/VectorStoreSearchResult"
        has_more:
          type: boolean
        next_page:
          type:
            - string
            - "null"
    ChatCompletionsRequest:
      type: object
      description: |
        Minimal validated request for shim `/v1/chat/completions` proxying.

        The official OpenAI Chat Completions API supports many more fields; the
        shim validates only `model` and `messages` before forwarding the request
        upstream and does not claim full ownership of the upstream schema.
      required: [model, messages]
      additionalProperties: true
      properties:
        model:
          type: string
        messages:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: true
            properties:
              role:
                type: string
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      type: object
                      additionalProperties: true
    ProxyJSONResponse:
      type: object
      additionalProperties: true
    ChatCompletionResource:
      type: object
      description: |
        Sanitized Chat Completion JSON resource shadow-stored locally by the
        shim for successful non-streaming `store: true` proxy requests.
      additionalProperties: true
    StoredChatCompletionList:
      type: object
      required: [object, data, has_more]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatCompletionResource"
        first_id:
          type: string
          nullable: true
        last_id:
          type: string
          nullable: true
        has_more:
          type: boolean
    StoredChatCompletionMessage:
      type: object
      description: |
        Stored input message entry reconstructed from the request `messages`
        array for a locally shadow-stored Chat Completion.
      additionalProperties: true
      properties:
        id:
          type: string
        role:
          type: string
        content:
          nullable: true
        name:
          type: string
          nullable: true
        content_parts:
          type: array
          nullable: true
          items:
            type: object
            additionalProperties: true
    StoredChatCompletionMessagesList:
      type: object
      required: [object, data, has_more]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: "#/components/schemas/StoredChatCompletionMessage"
        first_id:
          type: string
          nullable: true
        last_id:
          type: string
          nullable: true
        has_more:
          type: boolean
